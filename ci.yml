name: CI

on:
  push: { branches: [main] }
  pull_request: { branches: [main] }

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }
      - run: pip install -r requirements.txt pytest pytest-cov ruff
      - name: Lint
        run: ruff check app tests || true
      - name: Tests
        run: pytest --cov=app --cov-report=xml -q
      - uses: actions/upload-artifact@v4
        with: { name: backend-coverage, path: backend/coverage.xml }

  frontend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: frontend } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20", cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci || npm install
      - run: npm run build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build backend image
        uses: docker/build-push-action@v6
        with: { context: ., file: backend/Dockerfile, push: false, tags: ai-backtest-backend:ci }
      - name: Build frontend image
        uses: docker/build-push-action@v6
        with: { context: ., file: frontend/Dockerfile, push: false, tags: ai-backtest-frontend:ci }
